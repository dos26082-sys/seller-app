<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seller CRM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #000000;
    --text2: #6d6d72;
    --accent: #007aff;
    --danger: #ff3b30;
    --success: #34c759;
    --border: #e0e0e0;
    --badge1-bg: #ddeeff;
    --badge1-text: #0055aa;
    --badge2-bg: #ddf5e7;
    --badge2-text: #1a7a3a;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tab {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  .section { display: none; padding: 12px; }
  .section.active { display: block; }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .form-group {
    margin-bottom: 12px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-group textarea {
    min-height: 70px;
    resize: vertical;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-danger-sm {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }

  .client-item {
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  .client-item:last-child { border-bottom: none; }

  .client-name {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .client-meta {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .client-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .badge-1 { background: var(--badge1-bg); color: var(--badge1-text); }
  .badge-2 { background: var(--badge2-bg); color: var(--badge2-text); }

  .client-sum {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
  }

  .client-comment {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
    font-style: italic;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .manager-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .manager-row:last-child { border-bottom: none; }

  .salary-big {
    font-size: 36px;
    font-weight: 700;
    color: var(--success);
    margin: 8px 0 4px;
  }

  .salary-sub {
    font-size: 13px;
    color: var(--text2);
  }

  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text2);
    font-size: 15px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #ffffff;
      --text2: #8e8e93;
      --border: #3a3a3c;
      --badge1-bg: #0a2a4a;
      --badge1-text: #5ac8fa;
      --badge2-bg: #0a2e1a;
      --badge2-text: #30d158;
    }
  }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('clients')">📋 Клиенты</button>
  <button class="tab" onclick="showTab('add')">➕ Добавить</button>
  <button class="tab" onclick="showTab('stats')">📊 Статистика</button>
  <button class="tab" onclick="showTab('salary')">💰 Зарплата</button>
</div>

<div id="tab-clients" class="section active">
  <div class="card">
    <div id="clients-list"></div>
  </div>
</div>

<div id="tab-add" class="section">
  <div class="card">
    <div class="card-title">Новый клиент</div>
    <div class="form-group">
      <label>ФИО</label>
      <input type="text" id="f-name" placeholder="Иванов Иван Иванович">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="f-phone" placeholder="+7 999 000 00 00">
      </div>
      <div class="form-group">
        <label>Регион</label>
        <input type="text" id="f-region" placeholder="Москва">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Кто вёл этап 1</label>
        <input type="text" id="f-m1" placeholder="Имя">
      </div>
      <div class="form-group">
        <label>Кто вёл этап 2</label>
        <input type="text" id="f-m2" placeholder="Имя">
      </div>
    </div>
    <div class="form-group">
      <label>Сумма сделки (₽)</label>
      <input type="number" id="f-sum" placeholder="100000" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Комментарий (как забрал)</label>
      <textarea id="f-comment" placeholder="Свободный текст..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="addClient()">Добавить клиента</button>
  </div>
</div>

<div id="tab-stats" class="section">
  <div class="stat-grid" id="stats-grid"></div>
  <div class="card">
    <div class="card-title">Этап 1</div>
    <div id="managers-1"></div>
  </div>
  <div class="card">
    <div class="card-title">Этап 2</div>
    <div id="managers-2"></div>
  </div>
</div>

<div id="tab-salary" class="section">
  <div class="card">
    <div class="card-title">Курс пересчёта</div>
    <div class="form-group">
      <label>Грн за каждые 100 000 ₽</label>
      <input type="number" id="rate" value="2850" inputmode="numeric" oninput="calcSalary()">
    </div>
  </div>
  <div class="card" id="salary-result"></div>
</div>

<script>
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  let clients = JSON.parse(localStorage.getItem('crm_v1') || '[]');

  function save() {
    localStorage.setItem('crm_v1', JSON.stringify(clients));
  }

  function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const names = ['clients','add','stats','salary'];
    document.querySelectorAll('.tab')[names.indexOf(name)].classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'stats') renderStats();
    if (name === 'salary') calcSalary();
    if (name === 'clients') renderClients();
  }

  function addClient() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Введите ФИО'); return; }
    clients.unshift({
      id: Date.now(),
      name,
      phone: document.getElementById('f-phone').value.trim(),
      region: document.getElementById('f-region').value.trim(),
      m1: document.getElementById('f-m1').value.trim(),
      m2: document.getElementById('f-m2').value.trim(),
      sum: parseFloat(document.getElementById('f-sum').value) || 0,
      comment: document.getElementById('f-comment').value.trim()
    });
    save();
    ['f-name','f-phone','f-region','f-m1','f-m2','f-sum','f-comment'].forEach(id => document.getElementById(id).value = '');
    showTab('clients');
  }

  function deleteClient(id) {
    if (!confirm('Удалить клиента?')) return;
    clients = clients.filter(c => c.id !== id);
    save();
    renderClients();
  }

  function renderClients() {
    const el = document.getElementById('clients-list');
    if (!clients.length) {
      el.innerHTML = '<div class="empty">Клиентов пока нет</div>';
      return;
    }
    el.innerHTML = clients.map(c => `
      <div class="client-item">
        <div class="client-row">
          <div class="client-name">${c.name}</div>
          <button class="btn-danger-sm" onclick="deleteClient(${c.id})">Удалить</button>
        </div>
        <div class="client-meta">${[c.phone, c.region].filter(Boolean).join(' · ') || '—'}</div>
        <div class="badges">
          ${c.m1 ? '<span class="badge badge-1">Э1: ' + c.m1 + '</span>' : ''}
          ${c.m2 ? '<span class="badge badge-2">Э2: ' + c.m2 + '</span>' : ''}
        </div>
        ${c.sum ? '<div class="client-sum">' + c.sum.toLocaleString('ru-RU') + ' ₽</div>' : ''}
        ${c.comment ? '<div class="client-comment">' + c.comment + '</div>' : ''}
      </div>
    `).join('');
  }

  function renderStats() {
    const total = clients.length;
    const totalSum = clients.reduce((a, c) => a + (c.sum || 0), 0);
    const withM1 = clients.filter(c => c.m1).length;
    const withM2 = clients.filter(c => c.m2).length;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Клиентов</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Сумма сделок</div><div class="stat-value">${(totalSum/1000).toFixed(0)}K</div><div class="stat-sub">рублей</div></div>
      <div class="stat-card"><div class="stat-label">Закрыто этап 1</div><div class="stat-value">${withM1}</div></div>
      <div class="stat-card"><div class="stat-label">Закрыто этап 2</div><div class="stat-value">${withM2}</div></div>
    `;

    const m1 = {}, m2 = {};
    clients.forEach(c => {
      if (c.m1) m1[c.m1] = (m1[c.m1] || 0) + 1;
      if (c.m2) m2[c.m2] = (m2[c.m2] || 0) + 1;
    });

    const renderManagers = (obj, badgeClass) => {
      const entries = Object.entries(obj).sort((a,b) => b[1]-a[1]);
      if (!entries.length) return '<div class="empty" style="padding:12px">Нет данных</div>';
      return entries.map(([n,c]) => `
        <div class="manager-row">
          <span>${n}</span>
          <span class="badge ${badgeClass}">${c} кл.</span>
        </div>
      `).join('');
    };

    document.getElementById('managers-1').innerHTML = renderManagers(m1, 'badge-1');
    document.getElementById('managers-2').innerHTML = renderManagers(m2, 'badge-2');
  }

  function calcSalary() {
    const rate = parseFloat(document.getElementById('rate').value) || 0;
    const totalSum = clients.reduce((a, c) => a + (c.sum || 0), 0);
    const salary = Math.round((totalSum / 100000) * rate);
    document.getElementById('salary-result').innerHTML = `
      <div class="stat-label">Общая сумма сделок</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:12px">${totalSum.toLocaleString('ru-RU')} ₽</div>
      <div class="stat-label">Моя зарплата</div>
      <div class="salary-big">${salary.toLocaleString('ru-RU')} ₴</div>
      <div class="salary-sub">при курсе ${rate.toLocaleString('ru-RU')} грн / 100 000 ₽</div>
    `;
  }

  renderClients();
</script>
</body>
</html>
